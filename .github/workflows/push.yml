name: C++

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y cmake libpng-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake libpng

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          vcpkg install libpng:x64-windows

      - name: Configure (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cmake -S . -B build -DPLATE_TECTONICS_BUILD_SIMULATION=ON -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DPLATE_TECTONICS_BUILD_SIMULATION=ON -DBUILD_TESTING=ON

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Test (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure

      - name: Upload regression PNGs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-pngs-${{ matrix.os }}
          path: build/regression_*.png
          if-no-files-found: ignore
